name: Password Leak Scanner

on:
  # Run daily at 2 AM UTC
  schedule:
    - cron: '0 2 * * *'
  
  # Allow manual triggering
  workflow_dispatch:
    inputs:
      organizations:
        description: 'Comma-separated list of organizations to scan'
        required: false
        default: 'bcgov,bcgov-c'

jobs:
  scan:
    name: Scan for Password Leaks
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 6 hours max
    
    permissions:
      contents: read
      issues: write
      security-events: read
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run password leak scanner
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          ORGANIZATIONS: ${{ github.event.inputs.organizations || 'bcgov,bcgov-c' }}
          ISSUE_LABELS: 'security,password-leak-scan'
        run: npm start
      
      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: scanner-logs
          path: |
            *.log
          retention-days: 7
